<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work - Tiffany Xu</title>
    <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="main-title">Tiffany Xu</h1>
            <nav class="nav-buttons">
                <a href="index.html" class="nav-btn">About</a>
                <div class="nav-dropdown">
                    <a href="work.html" class="nav-btn active">Work</a>
                    <div class="dropdown-content">
                        <a href="work.html">Illustration</a>
                        <a href="board-game.html">Board Games</a>
                        <a href="installation.html">Installation</a>
                    </div>
                </div>
            </nav>
        </header>
        
        <main class="work-content">
            <div class="work-layout">
                <aside class="thumbnail-column">
                    <h2 style="margin-bottom: 25px;">Projects</h2>
                    
                    <a href="work.html" class="sidebar-category">Illustration</a>
                    <a href="board-game.html" class="sidebar-category">Board Games</a>
                    
                    <a href="installation.html" class="sidebar-category active">Installation</a>
                    <div class="thumbnail-gallery category-gallery">
                        <div class="thumbnail-item active" data-project="1">
                            <div class="thumbnail-img-wrapper">
                                <img src="images/projects/highschool/fish2.jpg" alt="highschool">
                            </div>
                            <div class="thumbnail-subtitle">Fish Lantern</div>
                        </div>
                    </div>
                </aside>
                
                <!-- Center Column: Main Project View -->
                <section class="main-view-column">
                    <div class="project-display" id="projectDisplay">
                        <button class="gallery-arrow left-arrow" id="leftArrow" aria-label="Previous image">‹</button>
                        <img id="mainImage" src="" alt="Selected Project">
                        <button class="gallery-arrow right-arrow" id="rightArrow" aria-label="Next image">›</button>
                    </div>
                    
                    <div class="project-description" id="projectDescription">
                        <h2 id="projectTitle"></h2>
                        <h3 id="projectSubtitle" class="project-subtitle"></h3>
                        <p id="projectText"></p>
                        <div class="project-components" id="projectComponents"></div>
                    </div>
                </section>
            </div>
        </main>
        
        <!-- Zoom Modal -->
        <div id="zoomModal" class="zoom-modal">
            <button class="zoom-close" id="zoomClose" aria-label="Close zoom">×</button>
            <button class="zoom-arrow zoom-left-arrow" id="zoomLeftArrow" aria-label="Previous image">‹</button>
            <img id="zoomImage" class="zoom-image" src="" alt="Zoomed image">
            <button class="zoom-arrow zoom-right-arrow" id="zoomRightArrow" aria-label="Next image">›</button>
        </div>
        
        <footer>
            <p>&copy; 2026 Tiffany Xu. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="work.js?v=15"></script>
</body>
</html>
